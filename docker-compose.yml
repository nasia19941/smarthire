version: '3.8'

services:
  db:
    image: postgres:16
    container_name: smarthire-db
    environment:
      POSTGRES_DB: smarthire
      POSTGRES_USER: smarthire_user
      POSTGRES_PASSWORD: smarthire123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: smarthire-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/smarthire
      SPRING_DATASOURCE_USERNAME: smarthire_user
      SPRING_DATASOURCE_PASSWORD: smarthire123
    depends_on:
      - db

volumes:
  postgres_data: